<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>London's Calling</ion-title>
    <ion-buttons slot="end">
      <ion-menu-button mode="md"></ion-menu-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="ion-padding">
  @if (user === null) {
    <ion-button expand="block" fill="clear" routerLink="/auth/login">
      Login
    </ion-button>
  }
  <app-sponsor-list></app-sponsor-list>
</ion-content>
