<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Manage Announcements</ion-title>
    <ion-buttons slot="end">
      <ion-menu-button mode="md"></ion-menu-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-button expand="block" [routerLink]="['/admin/announcement/new']">Create Announcement</ion-button>
  <h1>Existing Announcements</h1>
  <ion-list>
    @for (announcement of announcements; track $index) {
      <ion-item [routerLink]="['/admin/announcement/' + announcement.id]" [state]="{announcement: announcement}" detail>
        <ion-label>{{announcement.title}}</ion-label>
      </ion-item>
    }
  </ion-list>
</ion-content>
