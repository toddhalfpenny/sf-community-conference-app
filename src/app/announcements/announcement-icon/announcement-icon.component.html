@if (shouldShow) {
  <ion-button shape="round" [class]="{'has-unread': hasUnreadAnnouncements}" [fill]="hasUnreadAnnouncements ? 'solid' : 'clear'" [routerLink]="['/announcements']">
    <ion-icon
      [name]="hasUnreadAnnouncements ? 'notifications' : 'notifications-outline'"
      [class]="{'has-unread': hasUnreadAnnouncements}"
      slot="icon-only"></ion-icon>
  </ion-button>
}
