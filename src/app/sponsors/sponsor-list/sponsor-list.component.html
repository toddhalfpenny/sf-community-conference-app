<h2>Our Sponsors</h2>
<p><em>(will be an ordered + categorised list of sponsor cards)</em></p>
@if (sponsorList) {

  @for(tier of tiers; track $index) {
    <h2>{{tier}}</h2>
    <ion-list>
      @for(sponsor of sponsorList[tier]; track $index) {
        @if (sponsor) {
          <ion-item>
            {{ sponsor.name }}
          </ion-item>
        }
      } 
    </ion-list>
  }
}
