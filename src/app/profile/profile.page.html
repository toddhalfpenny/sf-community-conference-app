<ion-header>
  <ion-toolbar>
    <ion-buttons slot="end">
      <ion-menu-button mode="md"></ion-menu-button>
    </ion-buttons>
    <ion-title>Profile</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="ion-padding">
  <ion-alert
    [isOpen]="showAlert"
    [header]="alertHeader"
    [message]="alertMessage"
    [buttons]="alertButtons"
    (didDismiss)="showAlert = false"
  ></ion-alert>
  @if (user) {
    <ion-card>
      <qrcode
        [qrdata]='`{"i":"${user.id}","f":"${user.firstname}","l":"${user.lastname}"}`' [width]="256"
        [errorCorrectionLevel]="'M'"
        [cssClass]="'center'"
        [colorDark]="'#9e1e21ff'"></qrcode>
    </ion-card>
  }
  <ion-card>
    <ion-card-header>
      <ion-card-title>Settings</ion-card-title>
    </ion-card-header>
    <ion-card-content>
      <ion-button expand="block" fill="outline" color="danger" (click)="clearTTL()">
        <ion-icon slot="start" name="trash-bin"></ion-icon>
        Clear Cache TTL
      </ion-button>
      <ion-button expand="block" fill="outline" color="danger" (click)="clearLocalData()">
        <ion-icon slot="start" name="trash"></ion-icon>
        Purge local data (except auth)
      </ion-button>
    </ion-card-content>
  </ion-card>
</ion-content>
