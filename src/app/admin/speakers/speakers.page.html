<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Manage Speakers</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <h1>Import Speakers</h1>
  <input type="file" id="speakers" name="speakers" accept="text/xls" #speakerInput />
  <ion-button (click)="importSpeakers()">Import</ion-button>
  <hr/>
  <h1>Existing Speakers</h1>
  <ion-list>
    @for (speaker of speakers; track $index) {
      <ion-item>
          <ion-text>{{speaker.firstname}} {{speaker.lastname}}</ion-text>
      </ion-item>
    }
  </ion-list>
</ion-content>
