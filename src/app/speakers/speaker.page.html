<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button></ion-back-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  @if (speaker && sessions) {
    <app-speaker-card
      [speaker]="speaker"
      [sessions]="sessions"
      [showBio]="true"></app-speaker-card>
  }
</ion-content>
