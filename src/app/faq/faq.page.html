<ion-header>
  <ion-toolbar>
    <ion-buttons slot="end">
      <ion-menu-button mode="md"></ion-menu-button>
    </ion-buttons>
    <ion-title>F.A.Qs</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  @if (faqs) {
    <ion-list>
      @for (faq of faqs; track $index) {
        <ion-item>
          <ion-label>
            <h2>{{ faq.question }}</h2>
            <p>{{ faq.answer }}</p>
          </ion-label>
        </ion-item>
      }
    </ion-list>
  }
</ion-content>
