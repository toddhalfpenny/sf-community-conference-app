<ion-header>
  <ion-toolbar>
    <ion-buttons slot="end">
      <ion-menu-button mode="md"></ion-menu-button>
    </ion-buttons>
    <ion-title>{{ header }}</ion-title>
  </ion-toolbar>
  <ion-toolbar>
    <ion-searchbar show-clear-button="focus"
      [debounce]="400" 
      (ionInput)="handleSearchChange($event)">
    </ion-searchbar>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="ion-padding">
  <app-leads-list
    [leads]="leads"
    [searchTerm]="searchTerm"
  ></app-leads-list>
  <a #downloadlink download="leads.csv" style="display: none;"></a>
</ion-content>

<ion-footer>
  <ion-row>
    <ion-col>
      <ion-button [disabled]="leads.length === 0" (click)="exportLeads()" expand="block" shape="round" color="primary" size="large">
        Export
      </ion-button>
    </ion-col>
    <ion-col>
      <ion-button expand="block" shape="round" color="primary" size="large" routerLink="/scanner">
        <ion-icon slot="start" name="scan-circle"></ion-icon>
      </ion-button>
    </ion-col>
    </ion-row>
</ion-footer>
